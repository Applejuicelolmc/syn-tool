version: '3.8'

services:
  synology-tool:
    build: .
    container_name: synology-storage-tool
    ports:
      - "9000:9000"
    volumes:
      # Persistent data (Excel uploads, edit history, settings)
      - ./data:/app/data
      # NAS volumes for share scanning
      - /volume1:/volume1:ro
      # - /volume2:/volume2:ro
    environment:
      - PORT=9000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
    # Required for btrfs subvolume/qgroup commands (accurate share sizes)
    privileged: true
    restart: unless-stopped
