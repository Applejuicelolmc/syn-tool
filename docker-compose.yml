version: '3.8'

services:
  synology-tool:
    image: ghcr.io/applejuicelolmc/syn-tool:latest
    container_name: syn-tool
    ports:
      - "9000:9000"
    volumes:
      # Persistent data (Excel uploads, edit history, settings)
      - ./data:/app/data
      # NAS volumes for share scanning
      - /volume1:/volume1:ro
      # - /volume2:/volume2:ro
      # Optional: custom branding (logo.png, favicon.ico)
      # - ./branding:/app/branding:ro
    environment:
      - PORT=9000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      # Optional: set to /app/branding if the volume above is uncommented
      # - BRANDING_DIR=/app/branding
    privileged: true
    pid: host
    restart: unless-stopped
